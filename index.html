<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Villa Volcán Tours — Altiplano Adventure · Putre, Chile</title>
<meta name="description" content="Tours de aventura en el Altiplano Chileno desde Putre, 3.500 msnm. Volcanes, salares, termas, cultura aymara."/>
<meta property="og:title" content="Villa Volcán Tours"/>
<meta property="og:description" content="Expediciones al Altiplano Chileno desde Putre. Volcanes, salares, termas y cultura milenaria."/>
<meta property="og:type" content="website"/>
<meta name="theme-color" content="#2A1A0E"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Palette from NEW logo */
  --mountain:#906040;--mountain-light:#c0a070;--peak:#705020;
  --sun:#f0a000;--sun-hot:#d06010;--sun-glow:rgba(240,160,0,.12);
  --lake:#1070a0;--lake-light:#2090c0;
  --earth:#604020;--earth-light:#907040;
  --cactus:#807030;--mountain-btn:#c0a070;
  --bg:#1f1710;--bg-card:#2a2018;--bg-card2:#362a1e;
  --text:#f4f0ea;--text-mid:#c4b8a0;--text-dim:#9a8e7e;
  --ff-impact:'Oswald',sans-serif;
  --ff-ed:'Crimson Pro',Georgia,serif;
  --ff-body:'Outfit',system-ui,sans-serif;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--ff-body);background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.6}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:200;background:#f4f0ea;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .6s,visibility .6s}
#splash.done{opacity:0;visibility:hidden;pointer-events:none}
#splash img{width:min(300px,70vw);opacity:0;animation:li 1s .3s forwards}
#splash .tg{font:italic 400 15px var(--ff-ed);color:#6e5a40;margin-top:14px;opacity:0;animation:fu .7s .9s forwards}
@keyframes li{0%{opacity:0;transform:scale(.88)}100%{opacity:1;transform:scale(1)}}
@keyframes fu{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(26,16,8,.92),transparent);transition:background .3s}
nav.solid{background:rgba(26,16,8,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(144,96,64,.15)}
.n-logo{height:36px}
.n-right{display:flex;align-items:center;gap:8px}
.n-lang{padding:5px 10px;border-radius:14px;font:500 11px var(--ff-body);color:var(--text-dim);transition:all .3s}
.n-lang.on{background:var(--sun);color:var(--bg)}
.n-wa{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:18px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:#25d366;font:600 11px var(--ff-body);transition:all .3s}
.n-wa:hover{background:rgba(37,211,102,.18)}
.n-wa svg{width:14px;height:14px;fill:#25d366}

/* HERO */
.hero{position:relative;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 24px 48px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:url('volcan-hero.webp') center 30%/cover no-repeat}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(175deg,rgba(26,16,8,.08) 0%,rgba(26,16,8,.04) 20%,rgba(26,16,8,.3) 50%,rgba(26,16,8,.88) 78%,rgba(26,16,8,1) 95%)}
.hc{position:relative;z-index:2;max-width:720px}
.h-ey{font:500 11px/1 var(--ff-impact);letter-spacing:.28em;text-transform:uppercase;color:var(--sun);margin-bottom:16px;opacity:0;animation:fu .6s 1.8s forwards}
.hero h1{font:700 clamp(3rem,9vw,5.8rem)/.88 var(--ff-impact);text-transform:uppercase;letter-spacing:-.01em;color:var(--text);opacity:0;animation:fu .7s 2s forwards}
.hero h1 span{color:var(--sun)}
.h-sub{font:italic 400 clamp(1rem,2.4vw,1.25rem)/1.5 var(--ff-ed);color:var(--text-mid);margin:16px 0 28px;max-width:520px;opacity:0;animation:fu .6s 2.3s forwards}
.h-ctas{display:flex;flex-wrap:wrap;gap:12px;opacity:0;animation:fu .6s 2.5s forwards}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:8px;font:600 14px var(--ff-body);letter-spacing:.02em;transition:all .35s}
.btn-sun{background:var(--sun);color:var(--bg)}
.btn-sun:hover{background:var(--sun-hot);transform:translateY(-2px);box-shadow:0 8px 28px rgba(240,160,0,.3)}
.btn-o{color:var(--text);border:1.5px solid rgba(244,240,234,.2)}
.btn-o:hover{border-color:var(--sun);color:var(--sun)}
.h-met{display:flex;gap:36px;margin-top:44px;padding-top:22px;border-top:1px solid rgba(144,96,64,.25);opacity:0;animation:fu .5s 2.7s forwards}
.m-n{font:600 28px var(--ff-impact);color:var(--sun)}
.m-l{font:300 10px var(--ff-body);color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}

/* SECTIONS */
section{padding:96px 24px}
.inner{max-width:1100px;margin:0 auto}
.ey{font:600 11px var(--ff-impact);letter-spacing:.28em;text-transform:uppercase;color:var(--sun);margin-bottom:10px;display:block}
.sh{font:600 clamp(1.9rem,5vw,3rem)/1.05 var(--ff-impact);text-transform:uppercase;color:var(--text);margin-bottom:10px}
.ss{font:italic 400 15.5px/1.7 var(--ff-ed);color:var(--text);max-width:580px;margin-bottom:44px}
.sr{opacity:0;transform:translateY(28px);transition:opacity .65s,transform .65s}
.sr.v{opacity:1;transform:translateY(0)}

/* ABOUT */
.about{background:linear-gradient(180deg,var(--bg),#241a12)}
.ab-g{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.about p{font:300 14.5px/1.8 var(--ff-body);color:var(--text-mid);margin-bottom:12px}
.about strong{color:var(--text);font-weight:500}
.ab-pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:24px}
.ab-pill{padding:8px 16px;border-radius:8px;background:rgba(240,160,0,.15);border:1px solid rgba(240,160,0,.2);font:500 12px var(--ff-body);color:var(--sun);display:flex;align-items:center;gap:6px}
.ab-vis{position:relative;border-radius:20px;overflow:hidden;aspect-ratio:4/5;background:linear-gradient(145deg,#2a1a10,#1a2a1a,#1a1a2a);display:flex;align-items:center;justify-content:center;border:1px solid rgba(144,96,64,.08)}
.ab-vis::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 70%,rgba(240,160,0,.06),transparent 60%)}
.av-n{font:700 clamp(4rem,12vw,6.5rem)/1 var(--ff-impact);color:var(--sun);text-align:center;position:relative;z-index:1}
.av-u{font:italic 400 20px var(--ff-ed);color:var(--text-mid);display:block;margin-top:4px}
.av-l{font:300 11px var(--ff-body);color:var(--text-dim);letter-spacing:.18em;text-transform:uppercase;margin-top:18px;text-align:center;position:relative;z-index:1}

/* TOURS */
.trs{background:var(--bg)}
.t-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px}
.ttb{padding:8px 18px;border-radius:18px;font:500 12px var(--ff-body);color:var(--text-dim);border:1px solid rgba(244,240,234,.06);transition:all .3s}
.ttb.on,.ttb:hover{background:var(--sun);color:var(--bg);border-color:var(--sun)}
.t-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
.tc{border-radius:14px;overflow:hidden;background:var(--bg-card);border:1px solid rgba(144,96,64,.12);transition:all .4s}
.tc:hover{border-color:rgba(144,96,64,.2);transform:translateY(-3px);box-shadow:0 16px 50px rgba(0,0,0,.35)}
.tc-vis{height:150px;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:14px 16px}
.tc-vis::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 20%,rgba(36,26,16,.85) 100%)}
.tc-cat{position:absolute;top:10px;left:10px;z-index:2;padding:3px 10px;border-radius:10px;font:600 9px var(--ff-impact);letter-spacing:.12em;text-transform:uppercase}
.c-h{background:rgba(16,112,160,.2);color:var(--lake-light)}.c-f{background:var(--sun-glow);color:var(--sun)}.c-i{background:rgba(208,96,16,.12);color:#e07030}.c-a{background:rgba(74,140,92,.12);color:#5cb86a}.c-x{background:rgba(244,240,234,.05);color:var(--text-mid)}
.tc-nm{position:relative;z-index:2;font:600 17px var(--ff-impact);text-transform:uppercase;color:var(--text)}
.tc-bd{padding:14px 16px}
.tc-ds{font:italic 400 13.5px/1.65 var(--ff-ed);color:var(--text);margin-bottom:10px}
.tc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tc-tg{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:5px;background:rgba(244,240,234,.08);font:400 11.5px var(--ff-body);color:var(--text)}
.tc-pr{overflow:hidden;max-height:0;opacity:0;transition:max-height .4s,opacity .3s .1s,padding .3s;padding:0}
.tc.sp .tc-pr{max-height:100px;opacity:1;padding:10px 0 4px}
.pr-r{display:flex;justify-content:space-between;align-items:baseline}
.pr-v{font:600 20px var(--ff-impact);color:var(--sun)}
.pr-u{font:400 13px var(--ff-body);color:var(--text-dim)}
.pr-n{font:italic 300 11px var(--ff-ed);color:var(--text-dim);margin-top:3px}
.tc-act{display:flex;gap:6px;padding:0 16px 14px}
.tc-rv{flex:1;padding:9px;border-radius:7px;text-align:center;background:rgba(240,160,0,.06);border:1px solid rgba(240,160,0,.12);color:var(--sun);font:500 11px var(--ff-body);transition:all .3s}
.tc-rv:hover{background:rgba(240,160,0,.12)}
.tc.sp .tc-rv{background:rgba(240,160,0,.03);color:var(--text-dim)}
.tc-wa{flex:1;padding:9px;border-radius:7px;text-align:center;background:rgba(37,211,102,.06);border:1px solid rgba(37,211,102,.18);color:#25d366;font:500 11px var(--ff-body);transition:all .3s}
.tc-wa:hover{background:rgba(37,211,102,.12)}


/* EXPANDABLE DETAILS */
.tc-expand{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1),opacity .3s;opacity:0}
.tc.expanded .tc-expand{max-height:900px;opacity:1}
.tc-xbtn{width:100%;padding:10px;border-radius:7px;text-align:center;background:rgba(144,96,64,.06);border:1px solid rgba(144,96,64,.1);color:var(--mountain-light);font:500 11px var(--ff-body);transition:all .3s;cursor:pointer}
.tc-xbtn:hover{background:rgba(144,96,64,.12)}
.tc.expanded .tc-xbtn{background:rgba(144,96,64,.03)}
.tc-x-inner{padding:16px;border-top:1px solid rgba(144,96,64,.15)}
/* Photo strip */
.tc-photos{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.tc-photos::-webkit-scrollbar{height:3px}
.tc-photos::-webkit-scrollbar-thumb{background:rgba(144,96,64,.3);border-radius:2px}
.tc-photo{flex-shrink:0;width:200px;height:130px;border-radius:10px;overflow:hidden;scroll-snap-align:start;background-size:cover;background-position:center;border:1px solid rgba(144,96,64,.1)}
/* Route steps */
.tc-route{margin:14px 0}
.tc-route-title{font:600 11px var(--ff-impact);letter-spacing:.15em;text-transform:uppercase;color:var(--sun);margin-bottom:10px}
.tc-step{display:flex;align-items:flex-start;gap:10px;padding:6px 0;position:relative}
.tc-step::before{content:'';position:absolute;left:7px;top:20px;bottom:-6px;width:1px;background:rgba(144,96,64,.15)}
.tc-step:last-child::before{display:none}
.tc-dot{width:15px;height:15px;border-radius:50%;background:rgba(240,160,0,.12);border:2px solid var(--sun);flex-shrink:0;margin-top:2px}
.tc-step-text{font:400 12.5px/1.5 var(--ff-body);color:var(--text)}
/* Flora & Fauna */
.tc-ff{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.tc-ff-box{padding:12px;border-radius:10px;background:rgba(244,240,234,.03);border:1px solid rgba(144,96,64,.06)}
.tc-ff-title{font:600 10px var(--ff-impact);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.tc-ff-title.flora{color:#6a9a4a}
.tc-ff-title.fauna{color:var(--sun)}
.tc-ff-list{font:300 12px/1.6 var(--ff-body);color:var(--text-mid)}
@media(max-width:500px){.tc-ff{grid-template-columns:1fr}.tc-photo{width:160px;height:105px}}

/* LOCATION */
.loc{background:linear-gradient(180deg,#241a12,var(--bg))}
.loc-g{display:grid;grid-template-columns:1fr 1fr;gap:44px}
.loc-fs{display:flex;flex-direction:column;gap:12px}
.lf{padding:18px;border-radius:12px;background:var(--bg-card);border:1px solid rgba(144,96,64,.12);display:flex;gap:14px}
.lf-i{font-size:22px;flex-shrink:0}
.lf h4{font:500 13px var(--ff-body);color:var(--text);margin-bottom:3px}
.lf p{font:300 13px/1.6 var(--ff-body);color:var(--text-mid)}
.loc-v{border-radius:16px;overflow:hidden;aspect-ratio:1;background:linear-gradient(135deg,#1a1008,#241a10,#1a1820);border:1px solid rgba(144,96,64,.06);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center}
.loc-v .cmp{font-size:56px;animation:spin 25s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* CTA */
.cta{background:linear-gradient(135deg,#1e2810,#1a1820);text-align:center;padding:96px 24px;border-top:1px solid rgba(144,96,64,.06)}
.cta .ss{margin-left:auto;margin-right:auto;text-align:center}
.cta-bts{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin-bottom:44px}
.bwa{background:#25d366;color:#fff;padding:15px 32px;border-radius:10px;font-size:15px}
.bwa:hover{background:#20bd5a;transform:translateY(-2px);box-shadow:0 10px 36px rgba(37,211,102,.3)}
.big{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff;padding:15px 32px;border-radius:10px;font-size:15px}
.big:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(225,48,108,.3)}
.cta-eco{padding-top:28px;border-top:1px solid rgba(144,96,64,.08)}
.cta-eco p{font:300 12px var(--ff-body);color:var(--text-dim)}
.cta-eco a{color:var(--sun);font-weight:500}

/* FOOTER */
footer{background:var(--bg);padding:36px 24px;text-align:center;border-top:1px solid rgba(244,240,234,.03)}
footer .fb{font:500 12px var(--ff-impact);letter-spacing:.18em;text-transform:uppercase;color:var(--sun);margin-bottom:5px}
footer p{font:300 11px var(--ff-body);color:var(--text-dim)}

/* WA FLOAT */
.wf{position:fixed;bottom:22px;right:22px;z-index:90;width:54px;height:54px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(37,211,102,.35);transition:all .3s;opacity:0;animation:fu .5s 3s forwards}
.wf:hover{transform:scale(1.1);box-shadow:0 8px 30px rgba(37,211,102,.45)}
.wf svg{width:26px;height:26px;fill:#fff}

@media(max-width:768px){
  .ab-g,.loc-g{grid-template-columns:1fr;gap:28px}
  .ab-vis{aspect-ratio:auto;padding:44px 20px;min-height:200px}
  .t-grid{grid-template-columns:1fr}
  section{padding:68px 20px}
  .hero{padding:0 20px 36px}
  .h-met{gap:20px;flex-wrap:wrap}
  .m-n{font-size:22px}
  .n-wa span{display:none}
  .tc-vis{height:120px}
}

[data-l]{display:none}
</style>
</head>

/* ════════════════════════════════════ RENDER ════════════════════════════════════ */
function tx(o){return (o&&o[L])||o?.es||o||''}
function waU(m){return 'https://wa.me/'+WA+'?text='+encodeURIComponent(m)}
function $(id){return document.getElementById(id)}

function render(){
  // Static UI
  $('splash-tg').textContent=tx(UI.splash);
  $('h-ey').textContent=tx(UI.heroEy);
  $('h-t1').innerHTML=tx(UI.heroT);
  $('h-sub').textContent=tx(UI.heroSub);
  $('h-btn1').textContent=tx(UI.heroBtn1);
  $('h-btn2').textContent=tx(UI.heroBtn2);
  $('met1').textContent=tx(UI.met1);
  $('met2').textContent=tx(UI.met2);
  $('met3').textContent=tx(UI.met3);
  // About
  var ah='<span class="ey">'+tx(UI.aboutEy)+'</span><h2 class="sh">'+tx(UI.aboutH)+'</h2><p>'+tx(UI.aboutP1)+'</p><p>'+tx(UI.aboutP2)+'</p><div class="ab-pills">';
  UI.pills.forEach(function(p){ah+='<div class="ab-pill"><span>'+p.i+'</span>'+tx(p)+'</div>'});
  $('about-text').innerHTML=ah+'</div>';
  // Tours
  $('t-ey').textContent=tx(UI.toursEy);
  $('t-h2').textContent=tx(UI.toursH);
  $('t-ss').textContent=tx(UI.toursSub);
  renderTabs();renderGrid('all');
  // Location
  $('l-ey').textContent=tx(UI.locEy);
  $('l-h2').textContent=tx(UI.locH);
  $('loc-reg').textContent=tx(UI.locReg);
  var lh='';
  UI.locFacts.forEach(function(f){
    var t=typeof f.t==='string'?f.t:tx(f.t);
    lh+='<div class="lf"><div class="lf-i">'+f.i+'</div><div><h4>'+t+'</h4><p>'+tx(f.p)+'</p></div></div>';
  });
  $('lfacts').innerHTML=lh;
  // CTA
  $('c-ey').textContent=tx(UI.ctaEy);
  $('c-h2').textContent=tx(UI.ctaH);
  $('c-ss').textContent=tx(UI.ctaSub);
  $('c-eco').innerHTML=tx(UI.ctaEco);
  // WA links
  var wm=tx(UI.waMsg);var wu=waU(wm);
  ['nwa','h-btn2','c-wa','wf'].forEach(function(id){var e=$(id);if(e)e.href=wu});
}

function renderTabs(){
  var h='';var keys=Object.keys(UI.cats);
  keys.forEach(function(k,i){
    h+='<button class="ttb'+(i===0?' on':'')+'" onclick="filt(\''+k+'\',this)">'+tx(UI.cats[k])+'</button>';
  });
  $('ttabs').innerHTML=h;
}

function renderGrid(f){
  var g=$('tgrid');var h='';
  T.forEach(function(t){
    if(f&&f!=='all'&&t.c!==f)return;
    var cc={half:'c-h',full:'c-f',intl:'c-i',adv:'c-a',xfer:'c-x'}[t.c]||'';
    var cl=tx(UI.cats[t.c])||'';
    var nm=tx(t.n),ds=tx(t.d),du=tx(t.dur),ic=tx(t.inc);
    var wm=L==='es'?'Hola! Me interesa: '+t.n.es+'. ¿Disponibilidad?':'Hi! Interested in: '+(t.n.en||t.n.es)+'. Availability?';
    var ph='';
    if(t.custom){ph='<div class="tc-pr"><div class="pr-r"><span class="pr-v" style="font-size:15px">'+tx(UI.customQ)+'</span></div></div>'}
    else if(t.clp>0){var fc=t.clp.toLocaleString('es-CL');var pn=tx(UI.paxNote).replace('{n}',t.pax);ph='<div class="tc-pr"><div class="pr-r"><span class="pr-v">$'+fc+' CLP</span><span class="pr-u">US$'+t.usd+'</span></div><div class="pr-n">'+pn+'</div></div>'}
    // Build expandable section
    var xh='';
    if(t.route||t.flora||t.fauna||t.imgs){
      xh='<div class="tc-expand"><div class="tc-x-inner">';
      // Photo strip
      if(t.imgs&&t.imgs.length){
        xh+='<div class="tc-photos">';
        t.imgs.forEach(function(u){xh+='<div class="tc-photo" style="background-image:url('+u+')"></div>'});
        xh+='</div>';
      }
      // Route
      if(t.route){
        var steps=t.route[L]||t.route.es;
        if(steps){
          xh+='<div class="tc-route"><div class="tc-route-title">'+tx(UI.routeLabel)+'</div>';
          steps.forEach(function(s){xh+='<div class="tc-step"><div class="tc-dot"></div><div class="tc-step-text">'+s+'</div></div>'});
          xh+='</div>';
        }
      }
      // Flora & Fauna
      if(t.flora||t.fauna){
        xh+='<div class="tc-ff">';
        if(t.flora) xh+='<div class="tc-ff-box"><div class="tc-ff-title flora">'+tx(UI.floraLabel)+'</div><div class="tc-ff-list">'+tx(t.flora)+'</div></div>';
        if(t.fauna) xh+='<div class="tc-ff-box"><div class="tc-ff-title fauna">'+tx(UI.faunaLabel)+'</div><div class="tc-ff-list">'+tx(t.fauna)+'</div></div>';
        xh+='</div>';
      }
      xh+='</div></div>';
    }
    var detBtn=xh?'<button class="tc-xbtn" onclick="txp(this)">'+tx(UI.details)+'</button>':'';
    h+='<div class="tc sr" data-c="'+t.c+'"><div class="tc-vis" style="background:'+t.grad+'"><div class="tc-cat '+cc+'">'+cl+'</div><div class="tc-nm">'+t.ic+' '+nm+'</div></div><div class="tc-bd"><div class="tc-ds">'+ds+'</div><div class="tc-tags"><span class="tc-tg">⏱ '+du+'</span>'+(ic?'<span class="tc-tg">🍽 '+ic+'</span>':'')+'</div>'+ph+'</div>'+xh+'<div class="tc-act">'+detBtn+(ph?'<button class="tc-rv" onclick="tp(this)">'+tx(UI.seeRates)+'</button>':'')+'<a class="tc-wa" href="'+waU(wm)+'" target="_blank" rel="noopener">'+tx(UI.consult)+'</a></div></div>';
  });
  g.innerHTML=h;
  setTimeout(function(){g.querySelectorAll('.sr').forEach(function(el,i){setTimeout(function(){el.classList.add('v')},i*40)})},30);
}

function txp(b){var c=b.closest('.tc');var s=c.classList.toggle('expanded');b.textContent=s?tx(UI.hideDetails):tx(UI.details)}
function tp(b){var c=b.closest('.tc');var s=c.classList.toggle('sp');b.textContent=s?tx(UI.hideRates):tx(UI.seeRates)}
function filt(c,b){document.querySelectorAll('.ttb').forEach(function(x){x.classList.remove('on')});b.classList.add('on');renderGrid(c)}

function setL(l){
  L=l;document.documentElement.lang=l;
  document.querySelectorAll('.n-lang').forEach(function(b){b.classList.toggle('on',b.textContent.trim().toLowerCase()===l)});
  render();
}

document.addEventListener('DOMContentLoaded',function(){
  render();
  setTimeout(function(){$('splash').classList.add('done')},2600);
  window.addEventListener('scroll',function(){$('nav').classList.toggle('solid',scrollY>80)});
  var obs=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)e.target.classList.add('v')})},{threshold:0.08,rootMargin:'0px 0px -30px 0px'});
  document.querySelectorAll('.sr').forEach(function(el){obs.observe(el)});
});
</script>
